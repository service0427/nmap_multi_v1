# ==============================================================================
# 글로벌 인프라 구조 설정 (Global Infrastructure Configuration)
# ==============================================================================

# API 서버 호스트 및 포트 주소
API_SERVER="114.207.112.245:8013"

# 벌점 리셋 및 어드민 명령어 전송 서버 포트 주소 (web_monitor.py 연동)
ADMIN_API_SERVER="114.207.112.245:8001"

# 각 단말기 기동 시 병목 방지를 위한 기동 시간 간격 (초 단위)
DEVICE_START_DELAY=2

# ------------------------------------------------------------------------------
# 스케줄러 및 주행 스위치 제어 변수 (전역 관리)
# ------------------------------------------------------------------------------

# 대역폭 보전을 위한 동일 모뎀(Subnet) 내 단말기 동시 주행 제한 락 (true/false)
# - true: 동일 서브넷 내에서는 단말기가 순차적으로만 주행을 시작함
# - false: 서브넷 락을 우회하여 동시 주행 속도 극대화 (당장 안 쓰나 예비용으로 보유)
USE_SUBNET_LOCK="false"

# 네트워크 QoS 지연 대응 GPS 출발 안전장치 (true/false)
# - true: 네비 화면 진입 패킷 검출 완료 후에 GPS 모의주행을 지연 기동함
# - false: 안내시작 버튼 클릭 즉시 GPS 모의주행 기동 (과거 안정 방식)
USE_GPS_QOS_GUARD="false"

# ------------------------------------------------------------------------------
# 인터넷 및 타임아웃/감시 임계치 설정 (전역 관리)
# ------------------------------------------------------------------------------

# 기동 초기 인터넷 연결 확인을 위한 curl 접속 제한 시간 (초 단위)
# - lte16 등 다중 단말 기동 시 모뎀 정체(Spike)로 인한 일시적인 인터넷 에러 감지를 예방
STARTUP_CONNECT_TIMEOUT=10

# 주행 및 기동 중 패킷 무반응 임계 시간 (초 단위)
# - 단말기가 70초 동안 새로운 패킷을 생성하지 않으면 Stuck으로 간주하여 강제종료
SILENCE_TIMEOUT_SECONDS=70

# 스케줄러가 감시하는 단일 작업 최대 생존 한계 시간 (초 단위)
# - main.sh 프로세스가 1200초(20분) 이상 구동 중일 경우 좀비로 간주하여 강제 킬 및 락 정리
STALE_TASK_TIMEOUT_SECONDS=1200

# ------------------------------------------------------------------------------
# nCaptcha/errorLog 및 정산 대기 설정 (실시간 패치 제어)
# ------------------------------------------------------------------------------

# Webview nCaptcha/errorLog 발생 시 강제 종료(Fail-Fast) 여부 (true/false)
# - true: errorLog 검출 시 작업을 즉시 실패(FAIL) 처리하고 종료
# - false: errorLog가 검출되어도 무시하고 계속 진행 (임시 통과)
export ERRORLOG_FAIL_FAST="false"

# nCaptcha/errorLog 패킷의 프록시 필터링/차단 여부 (true/false)
# - true: errorLog를 차단하고 가짜 응답을 주며 디스크 로그에도 기록 안 함
# - false: 차단 없이 Naver 본 서버로 패킷을 정상 전송하고 디스크 로그에도 기록함
export ERRORLOG_FILTER="false"

# 주행 완료 후 최종 안전운전 모드/정산 대기 시간 (초 단위)
# - 10: 10초 대기 (신버전 6.8.x 정산 안정성 극대화)
# - 1: 1초 대기 (과거 빠른 회전율 세팅)
export END_ROUTE_WAIT_SECONDS=10

# Webview 내 nCaptcha 모듈 초기화 타임아웃 한계 시간 설정 (밀리초 단위)
# - 10000: 10초로 강제 연장 (nCaptcha 및 상세페이지 타임아웃 예방 안정화 값)
# - 1000: 1초로 원복 (네이버 웹뷰 기본값, 1초 설정 시 타임아웃 에러 발생 빈도 측정용)
export NCAPTCHA_TIMEOUT_MS=10000


