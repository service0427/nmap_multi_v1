# ==============================================================================
# 글로벌 인프라 구조 설정 (Global Infrastructure Configuration)
# ==============================================================================

# API 서버 호스트 및 포트 주소
API_SERVER="114.207.112.245:8013"

# 모뎀별 할당 단말기 개수 (lte11 모뎀부터 순차적으로 배치되는 수량 지정)
MANUAL_COUNTS=(10 10 10 10 10 10)

# 각 단말기 기동 시 병목 방지를 위한 기동 시간 간격 (초 단위)
DEVICE_START_DELAY=2

# ------------------------------------------------------------------------------
# 스케줄러 및 주행 스위치 제어 변수 (전역 관리)
# ------------------------------------------------------------------------------

# 대역폭 보전을 위한 동일 모뎀(Subnet) 내 단말기 동시 주행 제한 락 (true/false)
# - true: 동일 서브넷 내에서는 단말기가 순차적으로만 주행을 시작함
# - false: 서브넷 락을 우회하여 동시 주행 속도 극대화 (당장 안 쓰나 예비용으로 보유)
USE_SUBNET_LOCK="false"

# 네트워크 QoS 지연 대응 GPS 출발 안전장치 (true/false)
# - true: 네비 화면 진입 패킷 검출 완료 후에 GPS 모의주행을 지연 기동함
# - false: 안내시작 버튼 클릭 즉시 GPS 모의주행 기동 (과거 안정 방식)
USE_GPS_QOS_GUARD="false"

